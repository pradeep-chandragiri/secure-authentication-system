<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">

<title>Account Created</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Afacad", sans-serif !important;
    user-select: none !important;
}

@media (prefers-color-scheme: dark) {

  body{
    font-family: "Afacad", sans-serif !important;
    background:#0A0A0A !important;
  }

  .card{
    background:#111111 !important;
    border-color:rgba(255,255,255,0.08) !important;
  }

  .logo,
  .heading,
  .footer-link{
    color:#FFFFFF !important;
  }

  .text,
  .meta{
    color:#A1A1AA !important;
  }

  .divider{
    border-color:rgba(255,255,255,0.08) !important;
  }

  .button{
    background:#FFFFFF !important;
    color:#000000 !important;
  }
}
</style>
</head>

<body style="margin:0;padding:0;background:transparent;">

<table width="100%" cellpadding="0" cellspacing="0" border="0">
<tr>
<td align="center" style="padding:0px;">

<table width="100%" cellpadding="0" cellspacing="0" border="0"
class="card"
style="
max-width:520px;
background:#FFFFFF;
border:1px solid rgba(0,0,0,0.08);
border-radius:0px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
">

<tr>
<td style="height:4px;background:#000000;"></td>
</tr>

<tr>
<td style="padding:40px;">

<div class="logo"
style="
font-size:28px;
font-weight:700;
letter-spacing:-1px;
color:#000000;
">
Secure Authentication System
</div>

<h1 class="heading"
style="
margin:36px 0 18px;
font-size:38px;
line-height:42px;
font-weight:700;
letter-spacing:-1.8px;
color:#000000;
">
Account created
</h1>

<p class="text"
style="
margin:0 0 34px;
font-size:16px;
line-height:28px;
color:#52525B;
">
Your account was successfully created and secured. You can now access all authentication features.
</p>

<a href="#"
class="button"
style="
display:block;
text-align:center;
background:#000000;
color:#FFFFFF;
padding:16px 20px;
font-size:15px;
font-weight:600;
text-decoration:none;
border-radius:0px;
">
Open Dashboard
</a>

<div class="divider"
style="
margin:36px 0;
border-top:1px solid rgba(0,0,0,0.08);
"></div>

<p class="meta"
style="
margin:0;
font-size:14px;
line-height:24px;
color:#52525B;
">
Developer: Pradeep Chandragiri
</p>

<p class="meta"
style="
margin:14px 0 0;
font-size:14px;
line-height:24px;
color:#52525B;
">
<a href="mailto:chandragiri.pradeeep@gmail.com"
class="footer-link"
style="color:#0078FF;text-decoration:underline;">
chandragiri.pradeeep@gmail.com
</a>
</p>

</td>
</tr>

</table>

</td>
</tr>
</table>
