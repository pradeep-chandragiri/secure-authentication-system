<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<title>Account Activity</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Afacad:ital,wght@0,400..700;1,400..700&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

<style>

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Afacad", sans-serif !important;
    user-select: none !important;
}

@media (prefers-color-scheme: dark) {

  body{
    font-family: "Afacad", sans-serif !important;
    background:#0A0A0A !important;
  }

  .card{
    background:#111111 !important;
    border-color:rgba(255,255,255,0.08) !important;
  }

  .logo,
  .heading,
  .footer-link,
  .activity-title{
    color:#FFFFFF !important;
  }

  .text,
  .meta{
    color:#A1A1AA !important;
  }

  .button{
    background:#FFFFFF !important;
    color:#000000 !important;
  }

  .activity-box{
    background:#171717 !important;
    border-color:rgba(255,255,255,0.08) !important;
  }
}
</style>
</head>

<body style="margin:0;padding:0;background:transparent;">

<table width="100%" cellpadding="0" cellspacing="0" border="0">
<tr>
<td align="center" style="padding:10px 0px;">

<table width="100%" cellpadding="0" cellspacing="0" border="0"
class="card"
style="
max-width:100%;
background:#FFFFFF;
border:1px solid rgba(0,0,0,0.08);
border-radius:0px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.08);
">

<tr>
<td style="height:4px;background:#000000;"></td>
</tr>

<tr>
<td style="padding:30px 20px;">

<div class="logo"
style="
font-size:28px;
font-weight:900;
letter-spacing:-1px;
color:#000000;
">
Secure Authentication System
</div>

<h1 class="heading"
style="
margin:36px 0 18px;
font-size:24px;
line-height:42px;
font-weight:700;
color:#000000;
">
New account activity
</h1>

<p class="text"
style="
margin:0 0 28px;
font-size:16px;
line-height:28px;
color:#52525B;
">
We detected a new login to your account from a recently used device or location.
</p>

<table width="100%"
cellpadding="0"
cellspacing="0"
border="0"
class="activity-box"
style="
background:#FAFAFA;
border:1px solid rgba(0,0,0,0.06);
margin-bottom:32px;
">

<tr>
<td style="padding:20px;">

<div class="activity-title"
style="
font-size:14px;
line-height:28px;
color:#000000;
">
<strong><b>Device</b>:</strong> {{userAgent}}<br>
<strong><b>IP</b>:</strong> {{ip}}
</div>

</td>
</tr>

</table>

<a href="#"
class="button"
style="
display:block;
text-align:center;
background:#000000;
color:#FFFFFF;
padding:16px 20px;
font-size:15px;
font-weight:600;
text-decoration:none;
border-radius:0px;
">
Review Activity
</a>

<div style="margin:36px 0;border-top:1px solid rgba(0,0,0,0.08);"></div>

<p class="meta"
style="
margin:0;
font-size:14px;
line-height:24px;
color:#52525B;
">
If this wasn't you, reset your password immediately.
</p>

</td>
</tr>

</table>

</td>
</tr>
</table>

</body>
</html>
